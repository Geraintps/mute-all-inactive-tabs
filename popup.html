<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mute Inactive Tabs</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
    }

    body {
      margin: 0;
      padding: 12px;
      min-width: 240px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #site {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 8px;
      word-break: break-all;
    }

    #message {
      font-size: 12px;
      margin-top: 8px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <label class="row">
    <input id="ignoreSite" type="checkbox">
    Ignore this site
  </label>
  <div id="site"></div>
  <div id="message" hidden></div>
  <script src="popup.js"></script>
</body>
</html>
